---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: external-dns-rules
spec:
  groups:
    - name: external-dns.rules
      labels:
        namespace: network
        app: cloudflare-dns
      rules:
        - alert: ExternalDNSStale
          expr: |-
            time() - external_dns_controller_last_sync_timestamp_seconds > 900
          for: 5m
          annotations:
            summary: >-
              ExternalDNS ({{ $labels.job }}) has not synced successfully in the last fifteen minutes
          labels:
            severity: warning
