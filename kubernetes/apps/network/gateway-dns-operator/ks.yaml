---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: gateway-dns-operator
spec:
  dependsOn:
    - name: adguard-home
  interval: 1h
  path: ./kubernetes/apps/network/gateway-dns-operator/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: network
  wait: false
