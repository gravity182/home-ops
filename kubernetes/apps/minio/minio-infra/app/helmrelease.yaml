---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: minio-infra
spec:
  chart:
    spec:
      chart: tenant
      version: 7.1.1
      sourceRef:
        kind: HelmRepository
        name: minio-operator
        namespace: minio
  interval: 1h
  values:
    tenant:
      name: minio-infra

      configSecret:
        name: minio-infra-env-configuration
        existingSecret: true

      # HTTP-only in-cluster (no TLS)
      certificate:
        requestAutoCert: false

      pools:
        - name: pool-0
          servers: 1
          volumesPerServer: 1
          size: 50Gi
          storageClassName: openebs-hostpath

      buckets:
        - name: homeserver-loki-chunks
        - name: homeserver-loki-ruler
        - name: homeserver-loki-admin
