---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: minio-operator
spec:
  chart:
    spec:
      chart: operator
      version: 7.1.1
      sourceRef:
        kind: HelmRepository
        name: minio-operator
  interval: 1h
  values:
    operator:
      # Single node cluster: default is 2 with required anti-affinity, which won't schedule.
      replicaCount: 1

