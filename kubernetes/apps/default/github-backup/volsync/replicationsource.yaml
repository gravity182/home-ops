---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/volsync.backube/replicationsource_v1alpha1.json
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: github-backup
spec:
  sourcePVC: github-backup
  trigger:
    schedule: "30 5 * * *"
  restic:
    repository: github-backup-volsync-repo
    copyMethod: Direct
    cacheStorageClassName: openebs-hostpath
    cacheCapacity: 2Gi
    pruneIntervalDays: 7
    moverSecurityContext:
      runAsUser: 1001
      runAsGroup: 1001
      fsGroup: 1001
    retain:
      daily: 14
      weekly: 8
      monthly: 6
