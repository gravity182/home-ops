---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: github-backup
spec:
  chartRef:
    kind: OCIRepository
    name: github-backup
  interval: 1h
  values:
    controllers:
      github-backup:
        type: cronjob
        cronjob:
          schedule: "0 4 * * *"
          timeZone: Europe/Moscow
          concurrencyPolicy: Forbid
          successfulJobsHistory: 3
          failedJobsHistory: 1
        pod:
          restartPolicy: OnFailure
        containers:
          app:
            image:
              repository: python
              tag: 3.14-alpine@sha256:26730869004e2b9c4b9ad09cab8625e81d256d1ce97e72df5520e806b1709f92
            command: ["/bin/sh", "-ec"]
            args:
              - |
                apk add --no-cache ca-certificates git git-lfs
                exec python /scripts/github_backup.py
            env:
              HOME: /tmp/home
              GITHUB_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: github-backup-token
                    key: GITHUB_TOKEN
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 1Gi
    defaultPodOptions:
      securityContext:
        fsGroup: 1001
        fsGroupChangePolicy: OnRootMismatch
    persistence:
      scripts:
        enabled: true
        type: configMap
        name: github-backup-script
        defaultMode: 0775
        globalMounts:
          - path: /scripts
            readOnly: true
      data:
        enabled: true
        type: persistentVolumeClaim
        storageClass: openebs-hostpath
        accessMode: ReadWriteOnce
        size: 20Gi
        globalMounts:
          - path: /data
      tmp:
        enabled: true
        type: emptyDir
        globalMounts:
          - path: /tmp
