---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./ocirepository.yaml
  - ./helmrelease.yaml
  - ./secret.sops.yaml
configMapGenerator:
  - name: github-backup-script
    files:
      - github_backup.py=./resources/github_backup.py
generatorOptions:
  disableNameSuffixHash: true
