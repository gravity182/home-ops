---
apiVersion: v1
kind: Secret
metadata:
  name: sonarr-volsync-repo
type: Opaque
stringData:
  RESTIC_REPOSITORY: s3:${SECRET_VOLSYNC_S3_ENDPOINT}/${SECRET_VOLSYNC_S3_BUCKET}/sonarr
  RESTIC_PASSWORD: ${SECRET_VOLSYNC_RESTIC_PASSWORD}
  AWS_ACCESS_KEY_ID: ${SECRET_VOLSYNC_AWS_ACCESS_KEY_ID}
  AWS_SECRET_ACCESS_KEY: ${SECRET_VOLSYNC_AWS_SECRET_ACCESS_KEY}
